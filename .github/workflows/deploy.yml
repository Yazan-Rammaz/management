name: Deploy

# Auto-deploy to Cloudflare Workers on every push to main.
# Requires two repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — token with "Edit Cloudflare Workers" permission
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#
# NEST_API_URL below is only a build-time placeholder so env validation passes
# during the build. The real backend URL is a Cloudflare secret on the worker
# (`wrangler secret put NEST_API_URL`) and is used at runtime.

on:
  push:
    branches: [main]

# Never run two deploys at once; cancel an in-flight one if a newer push lands.
concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build & deploy to Cloudflare
        run: npm run deploy
        env:
          NEST_API_URL: https://api.example.com
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
